<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard Despachos — retirado</title>
<style>
  :root{color-scheme:light dark}
  *{box-sizing:border-box}
  body{margin:0;min-height:100dvh;display:flex;align-items:center;justify-content:center;
       font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       background:#f5f7fb;color:#374151;padding:24px}
  @media(prefers-color-scheme:dark){body{background:#0f1420;color:#cbd5e1}}
  .box{max-width:440px;text-align:center;background:#fff;border-radius:14px;padding:32px 28px;
       box-shadow:0 2px 12px rgba(0,0,0,.08)}
  @media(prefers-color-scheme:dark){.box{background:#1a2130;box-shadow:none;border:1px solid #2a3444}}
  h1{margin:0 0 10px;font-size:19px;font-weight:700}
  p{margin:0 0 8px;font-size:13px;line-height:1.5;opacity:.85}
  .tag{display:inline-block;margin-top:14px;font-size:11px;letter-spacing:.4px;
       color:#6b7280;text-transform:uppercase}
</style>
</head>
<body>
  <div class="box">
    <h1>Dashboard de Ventas retirado</h1>
    <p>La integración con Google Sheets fue eliminada. Este tablero ya no consume datos de la hoja publicada.</p>
    <p>Si necesitás reportes de despacho, usá los módulos de la aplicación (Odoo / Workforce Platform).</p>
    <span class="tag">Google Sheets removido · jul-2026 · R-06D</span>
  </div>
</body>
</html>
