<style>*{box-sizing:border-box}body{margin:0;padding:16px;background:var(--bg);color:var(--text);font-family:var(--font,system-ui,sans-serif);font-size:13px}</style>
<style>
/* Impact tab */
.imp-page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.imp-page-hdr h2{font-size:18px;font-weight:800;color:var(--text-primary);margin:0 0 3px}
.imp-page-hdr p{font-size:12px;color:var(--text-muted);margin:0}
.imp-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.imp-kpi{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;text-align:center}
.imp-kpi-val{font-size:30px;font-weight:800;line-height:1;margin-bottom:5px}
.imp-kpi-label{font-size:11px;color:var(--text-muted);font-weight:600}
.imp-kpi.k-ninguno .imp-kpi-val{color:var(--green)}
.imp-kpi.k-leve    .imp-kpi-val{color:var(--amber)}
.imp-kpi.k-mod     .imp-kpi-val{color:#ea580c}
.imp-kpi.k-crit    .imp-kpi-val{color:var(--red)}
.imp-emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-bottom:20px}
.imp-emp-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:16px;transition:border-color .15s}
.imp-emp-card.nivel-leve{border-color:#fcd34d}
.imp-emp-card.nivel-moderado{border-color:#f97316}
.imp-emp-card.nivel-critico{border-color:#ef4444}
.imp-emp-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.imp-emp-name{font-size:14px;font-weight:700;color:var(--text-primary)}
.imp-emp-sub{font-size:11px;color:var(--text-muted)}
.imp-nivel-badge{margin-left:auto;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.imp-nivel-ninguno{background:var(--green-bg);color:var(--green-text)}
.imp-nivel-leve{background:var(--amber-bg);color:var(--amber-text)}
.imp-nivel-moderado{background:var(--orange-bg);color:var(--orange-text)}
.imp-nivel-critico{background:var(--red-bg);color:var(--red-text)}
.imp-breakdown{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.imp-breakdown-row{display:flex;align-items:center;gap:8px;font-size:12px}
.imp-breakdown-pol{flex:1;color:var(--text-secondary)}
.imp-breakdown-min{font-weight:700;white-space:nowrap}
.imp-breakdown-min.rojo{color:var(--red)}
.imp-breakdown-min.verde{color:var(--green)}
.imp-breakdown-min.gris{color:var(--text-muted)}
.imp-total-row{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border-light);font-size:13px;font-weight:700;color:var(--text-primary)}
.imp-total-val.rojo{color:var(--red)}
.imp-tareas-hdr{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin:10px 0 6px}
.imp-tarea-row{display:flex;align-items:center;gap:7px;font-size:12px;padding:5px 0;border-bottom:1px solid var(--border-light)}
.imp-tarea-row:last-child{border-bottom:none}
.imp-tarea-title{flex:1;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.imp-riesgo-badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap}
.imp-riesgo-alto{background:var(--red-bg);color:var(--red-text)}
.imp-riesgo-medio{background:var(--amber-bg);color:var(--amber-text)}
.imp-riesgo-bajo{background:var(--amber-bg);color:var(--amber-text)}
.imp-riesgo-ok{background:var(--green-bg);color:var(--green-text)}
.imp-empty{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:13px}
@media(max-width:700px){.imp-kpi-row{grid-template-columns:1fr 1fr}.imp-emp-grid{grid-template-columns:1fr}}
/* ── Equipo / Adopción (sub-vista del tab Impacto) ────────────────────────── */
/* Segmented control: distinto de .nav-tab (esa es la nav de módulo). Esto comunica un sub-nivel. */
.eqp-subtabs{display:inline-flex;gap:2px;padding:3px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-full);margin-bottom:18px}
.eqp-subtab{appearance:none;border:none;background:none;cursor:pointer;padding:7px 16px;border-radius:var(--radius-full);font-size:12px;font-weight:600;color:var(--text-secondary);display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:background .15s,color .15s}
.eqp-subtab:hover:not(.active){color:var(--text-primary)}
.eqp-subtab.active{background:var(--surface);color:var(--accent);box-shadow:var(--shadow)}
.eqp-subtab i{width:14px;height:14px;stroke:currentColor}
/* Toolbar: selector de localidad + ventana + refrescar */
.eqp-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.eqp-toolbar-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.eqp-loc-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px}
.eqp-select{min-width:150px;height:36px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text-primary);font-size:13px;font-family:inherit;cursor:pointer}
.eqp-select:focus{outline:none;border-color:var(--border-focus)}
.eqp-window-note{font-size:11px;color:var(--text-muted)}
/* KPI resumen (semáforo agregado) */
.eqp-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.eqp-kpi{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:var(--radius-md);padding:12px 14px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.eqp-kpi:hover{box-shadow:var(--shadow)}
.eqp-kpi.sel{box-shadow:var(--shadow)}
.eqp-kpi.s-activo{border-left-color:var(--green-dot)}
.eqp-kpi.s-activo.sel{border-color:var(--green-dot)}
.eqp-kpi.s-tibio{border-left-color:var(--amber-dot)}
.eqp-kpi.s-tibio.sel{border-color:var(--amber-dot)}
.eqp-kpi.s-inactivo{border-left-color:var(--red-dot)}
.eqp-kpi.s-inactivo.sel{border-color:var(--red-dot)}
.eqp-kpi.s-nunca{border-left-color:var(--text-3)}
.eqp-kpi.s-nunca.sel{border-color:var(--text-3)}
.eqp-kpi-val{font-size:26px;font-weight:800;line-height:1;color:var(--text-primary)}
.eqp-kpi-label{font-size:11px;color:var(--text-muted);font-weight:600;margin-top:4px;display:flex;align-items:center;gap:5px}
.eqp-kpi-label .eqp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.eqp-dot.d-activo{background:var(--green-dot)}
.eqp-dot.d-tibio{background:var(--amber-dot)}
.eqp-dot.d-inactivo{background:var(--red-dot)}
.eqp-dot.d-nunca{background:var(--text-3)}
/* Panel genérico */
.eqp-panel{margin:0 0 26px}
.eqp-panel-hdr{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 0 12px;flex-wrap:wrap}
.eqp-panel-title{font-size:13px;font-weight:700;color:var(--text-primary);display:flex;align-items:center;gap:7px;margin:0}
.eqp-panel-title i{width:15px;height:15px;stroke:currentColor;color:var(--text-secondary)}
.eqp-panel-sub{font-size:11px;color:var(--text-muted);margin:-6px 0 12px}
/* Semáforo de adopción: tarjetas por usuario, agrupadas por rol */
.eqp-role-group{margin-bottom:16px}
.eqp-role-group-hdr{font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin:0 0 10px}
.eqp-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}
.eqp-card{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:var(--radius-md);padding:11px 13px;min-height:52px}
.eqp-card.s-activo{border-left-color:var(--green-dot)}
.eqp-card.s-tibio{border-left-color:var(--amber-dot)}
.eqp-card.s-inactivo{border-left-color:var(--red-dot)}
.eqp-card.s-nunca{border-left-color:var(--text-3)}
.eqp-card-body{min-width:0;flex:1}
.eqp-card-name{font-size:13px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eqp-card-meta{font-size:11px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eqp-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:var(--radius-full);font-size:10px;font-weight:700;white-space:nowrap}
.eqp-tag.t-ascenso{background:var(--green-bg);color:var(--green-text)}
.eqp-tag.t-sostenido_alto{background:var(--blue-bg);color:var(--blue-text)}
.eqp-tag.t-estable_bajo{background:var(--surface-2);color:var(--text-secondary)}
.eqp-tag.t-descenso{background:var(--red-bg);color:var(--red-text)}
.eqp-tag.t-sin_historia{background:var(--surface-2);color:var(--text-muted)}
.eqp-tag i{width:11px;height:11px;stroke:currentColor}
/* Líneas de nivel de uso (SVG, estilo dash-trend, sin Chart.js) */
.eqp-lines-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.eqp-lines-svg{width:100%;height:auto;display:block;overflow:visible}
.eqp-lines-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.eqp-legend-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:var(--radius-full);border:1px solid var(--border);background:var(--surface-2);font-size:11px;color:var(--text-secondary);cursor:pointer;user-select:none;transition:opacity .15s,border-color .15s}
.eqp-legend-chip.off{opacity:.4}
.eqp-legend-chip .eqp-legend-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.eqp-lines-empty{text-align:center;padding:30px 20px;color:var(--text-muted);font-size:12px}
/* Barras de tareas por usuario (apiladas por estado) */
.eqp-bars{display:flex;flex-direction:column;gap:9px}
.eqp-bar-row{display:grid;grid-template-columns:140px 1fr 48px;align-items:center;gap:10px}
.eqp-bar-name{font-size:12px;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eqp-bar-track{display:flex;height:18px;border-radius:var(--radius-sm);overflow:hidden;background:var(--surface-2)}
.eqp-bar-seg{height:100%}
.eqp-bar-seg.b-activas{background:var(--blue-dot)}
.eqp-bar-seg.b-completadas{background:var(--amber-dot)}
.eqp-bar-seg.b-validadas{background:var(--green-dot)}
.eqp-bar-total{font-size:12px;font-weight:700;color:var(--text-secondary);text-align:right}
.eqp-bars-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;font-size:11px;color:var(--text-muted)}
.eqp-bars-legend span{display:inline-flex;align-items:center;gap:5px}
.eqp-bars-legend .eqp-sw{width:10px;height:10px;border-radius:2px}
/* Ranking por trayectoria (tabla ordenable) */
.eqp-table-wrap{border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden}
.eqp-table{width:100%;border-collapse:collapse;font-size:12px}
.eqp-table th{text-align:left;padding:9px 12px;background:var(--surface-2);color:var(--text-muted);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;cursor:pointer;user-select:none;border-bottom:1px solid var(--border)}
.eqp-table th .eqp-sort-ind{opacity:.5;font-size:9px;margin-left:3px}
.eqp-table th.sorted{color:var(--text-primary)}
.eqp-table th.num,.eqp-table td.num{text-align:right}
.eqp-table td{padding:9px 12px;border-bottom:1px solid var(--border-light);color:var(--text-primary)}
.eqp-table tr:last-child td{border-bottom:none}
.eqp-table tbody tr:hover{background:var(--surface-2)}
.eqp-it-bar{display:inline-block;width:46px;height:6px;border-radius:3px;background:var(--surface-2);overflow:hidden;vertical-align:middle;margin-right:7px}
.eqp-it-bar span{display:block;height:100%;background:var(--accent)}
.eqp-delta-up{color:var(--green-text);font-weight:700}
.eqp-delta-down{color:var(--red-text);font-weight:700}
.eqp-delta-flat{color:var(--text-muted)}
/* Panel de encargados */
.eqp-mgr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.eqp-mgr-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:13px 14px}
.eqp-mgr-name{font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.eqp-mgr-stats{display:flex;gap:16px}
.eqp-mgr-stat{flex:1}
.eqp-mgr-stat-val{font-size:22px;font-weight:800;color:var(--text-primary);line-height:1}
.eqp-mgr-stat-lbl{font-size:10px;color:var(--text-muted);margin-top:3px}
.eqp-termo-wrap{margin-bottom:11px}
.eqp-termo-row{margin-bottom:7px}
.eqp-termo-lbl{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-secondary)}
.eqp-termo-pct{font-size:12px;font-weight:800}
.eqp-termo-bar-bg{height:6px;border-radius:9px;background:var(--surface-3);overflow:hidden}
.eqp-termo-bar-fill{height:100%;border-radius:9px;transition:width .4s ease}
.eqp-termo-fill-green{background:var(--green-dot)}
.eqp-termo-fill-amber{background:var(--amber-dot)}
.eqp-termo-fill-red{background:var(--red-dot)}
.eqp-termo-fill-gray{background:var(--text-3)}
.eqp-termo-consolidado{font-size:11px;color:var(--text-muted);margin-top:2px;margin-bottom:9px}
.eqp-termo-seccion-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);margin-top:10px;margin-bottom:5px;padding-top:8px;border-top:1px solid var(--border)}
.eqp-empty{text-align:center;padding:36px 20px;color:var(--text-muted);font-size:13px}
.eqp-empty i{width:30px;height:30px;stroke:currentColor;color:var(--text-3);margin-bottom:8px;display:block;margin-left:auto;margin-right:auto}
.eqp-403{text-align:center;padding:44px 24px;color:var(--text-muted);font-size:13px;max-width:420px;margin:0 auto}
.eqp-403 i{width:34px;height:34px;stroke:currentColor;color:var(--amber);margin-bottom:10px;display:block;margin-left:auto;margin-right:auto}
@media(max-width:760px){
  .eqp-kpi-row{grid-template-columns:1fr 1fr}
  .eqp-toolbar{flex-direction:column;align-items:stretch}
  .eqp-toolbar-left{justify-content:space-between}
  .eqp-select{flex:1}
  .eqp-bar-row{grid-template-columns:96px 1fr 40px;gap:7px}
  .eqp-card-grid{grid-template-columns:1fr}
  .eqp-table-wrap{overflow-x:auto}
  .eqp-table{min-width:520px}
}
/* ── Empaque tab ──────────────────────────────────────────────────────────── */
</style>

<body>
<!-- ex historial.html 7925–7983 -->
    <div id="tab-impacto" style="display:none">

      <!-- Sub-pestañas: Equipo (nueva, por defecto) · Impacto de políticas (existente) -->
      <div class="eqp-subtabs" role="tablist">
        <button class="eqp-subtab active" id="imp-subtab-equipo" role="tab" onclick="impSetSub('equipo')"><i data-lucide="users"></i>Equipo</button>
        <button class="eqp-subtab" id="imp-subtab-politicas" role="tab" onclick="impSetSub('politicas')"><i data-lucide="zap"></i>Impacto de políticas</button>
      </div>

      <!-- ─────────── SUB-VISTA: EQUIPO / ADOPCIÓN ─────────── -->
      <div id="imp-sub-equipo">
        <div class="eqp-toolbar">
          <div class="eqp-toolbar-left">
            <span class="eqp-loc-label"><i data-lucide="map-pin" style="width:12px;height:12px;stroke:currentColor;vertical-align:-2px;margin-right:3px"></i>Localidad</span>
            <select id="eqp-loc" class="eqp-select" onchange="eqpRefresh()"><option value="todas">Todas</option></select>
            <span class="eqp-window-note" id="eqp-window-note"></span>
          </div>
          <button class="btn-sm" onclick="eqpRefresh()"><i data-lucide="refresh-cw" class="sec-hdr-icon"></i>Actualizar</button>
        </div>

        <!-- Resumen de adopción (semáforo agregado, filtra al hacer clic) -->
        <div class="eqp-kpi-row" id="eqp-kpi-row">
          <div class="eqp-kpi s-activo" onclick="eqpToggleSemFilter('activo')" title="Filtrar por activos"><div class="eqp-kpi-val" id="eqp-k-activo">—</div><div class="eqp-kpi-label"><span class="eqp-dot d-activo"></span>Activos</div></div>
          <div class="eqp-kpi s-tibio" onclick="eqpToggleSemFilter('tibio')" title="Filtrar por tibios"><div class="eqp-kpi-val" id="eqp-k-tibio">—</div><div class="eqp-kpi-label"><span class="eqp-dot d-tibio"></span>Tibios</div></div>
          <div class="eqp-kpi s-inactivo" onclick="eqpToggleSemFilter('inactivo')" title="Filtrar por inactivos"><div class="eqp-kpi-val" id="eqp-k-inactivo">—</div><div class="eqp-kpi-label"><span class="eqp-dot d-inactivo"></span>Inactivos</div></div>
          <div class="eqp-kpi s-nunca" onclick="eqpToggleSemFilter('nunca')" title="Filtrar por quienes nunca entraron"><div class="eqp-kpi-val" id="eqp-k-nunca">—</div><div class="eqp-kpi-label"><span class="eqp-dot d-nunca"></span>Nunca entró</div></div>
        </div>

        <!-- Cuerpo dinámico (semáforo de tarjetas + líneas + barras + ranking + encargados) -->
        <div id="eqp-body">
          <div class="eqp-empty"><div class="spinner" style="width:22px;height:22px;margin:0 auto 10px"></div>Cargando equipo…</div>
        </div>
      </div>
      <!-- /imp-sub-equipo -->

      <!-- ─────────── SUB-VISTA: IMPACTO DE POLÍTICAS (existente, intacta) ─────────── -->
      <div id="imp-sub-politicas" style="display:none">
      <div class="imp-page-hdr">
        <div>
          <h2><i data-lucide="zap" class="tab-h2-icon"></i>Impacto en Flujo de Trabajo</h2>
          <p>Efecto acumulado de todas las políticas sobre la ejecución de tareas</p>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <label style="font-size:11px;font-weight:700;color:var(--text-muted)">FECHA</label>
          <input type="date" id="imp-date" class="veh-filter-select">
          <button class="btn-sm" onclick="impRefresh()">Actualizar</button>
        </div>
      </div>
      <div class="imp-kpi-row">
        <div class="imp-kpi k-ninguno"><div class="imp-kpi-val" id="imp-k-ninguno">—</div><div class="imp-kpi-label"><i data-lucide="check-circle" style="width:11px;height:11px;stroke:currentColor;display:inline-block;vertical-align:-1px;margin-right:3px"></i>Sin impacto</div></div>
        <div class="imp-kpi k-leve">   <div class="imp-kpi-val" id="imp-k-leve">—</div>   <div class="imp-kpi-label"><i data-lucide="minus-circle" style="width:11px;height:11px;stroke:currentColor;display:inline-block;vertical-align:-1px;margin-right:3px"></i>Impacto leve</div></div>
        <div class="imp-kpi k-mod">    <div class="imp-kpi-val" id="imp-k-mod">—</div>    <div class="imp-kpi-label"><i data-lucide="alert-circle" style="width:11px;height:11px;stroke:currentColor;display:inline-block;vertical-align:-1px;margin-right:3px"></i>Moderado</div></div>
        <div class="imp-kpi k-crit">   <div class="imp-kpi-val" id="imp-k-crit">—</div>   <div class="imp-kpi-label"><i data-lucide="alert-octagon" style="width:11px;height:11px;stroke:currentColor;display:inline-block;vertical-align:-1px;margin-right:3px"></i>Crítico</div></div>
      </div>
      <div class="imp-emp-grid" id="imp-emp-grid">
        <div class="imp-empty">Selecciona una fecha y presiona Actualizar</div>
      </div>
      </div>
      <!-- /imp-sub-politicas -->
    </div>

<script>
// ── Adaptador de entorno: globals que el módulo espera del shell ──
var authFetch = islaFetch;
var _user = islaUser() || {};
var escH = esc;   // escH del shell = misma implementación que esc (duplicado histórico)
// authGetJson del shell hace refresh propio; en la isla islaFetch ya lee el
// token fresco del storage en cada request — basta parsear y fallar honesto.
async function authGetJson(url){
  var r = await islaFetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

function impInit() {
  var dateEl = document.getElementById('imp-date');
  if (dateEl && !dateEl.value) dateEl.value = new Date().toISOString().slice(0,10);
  // Sub-vista por defecto: Equipo. La de "Impacto de políticas" se carga al activarla.
  impSetSub(_impSub || 'equipo');
}

// ── Toggle de sub-pestañas del tab Impacto (Equipo / Impacto de políticas) ──
var _impSub = 'equipo';
function impSetSub(which) {
  _impSub = (which === 'politicas') ? 'politicas' : 'equipo';
  var eq = document.getElementById('imp-sub-equipo');
  var po = document.getElementById('imp-sub-politicas');
  var btnE = document.getElementById('imp-subtab-equipo');
  var btnP = document.getElementById('imp-subtab-politicas');
  if (eq) eq.style.display = (_impSub === 'equipo') ? '' : 'none';
  if (po) po.style.display = (_impSub === 'politicas') ? '' : 'none';
  if (btnE) btnE.classList.toggle('active', _impSub === 'equipo');
  if (btnP) btnP.classList.toggle('active', _impSub === 'politicas');
  if (_impSub === 'equipo') {
    eqpRefresh();                             // panel de monitoreo en vivo: datos frescos al entrar
  } else {
    impRefresh();                             // función ORIGINAL intacta (prepara _polCtxData + grid)
  }
}

function impRefresh() {
  var date = (document.getElementById('imp-date')||{}).value || new Date().toISOString().slice(0,10);
  var grid = document.getElementById('imp-emp-grid');
  if (grid) grid.innerHTML = '<div class="imp-empty"><div class="spinner" style="width:22px;height:22px;margin:0 auto 10px"></div>Calculando impacto…</div>';

  // Re-fetch context data for this date
  var fetchBreaks = POL_USE_MOCK ? Promise.resolve(null)
    : authFetch('/api/wwp/lunch/breaks?date='+date).then(function(r){ return r.json(); }).catch(function(){ return null; });
  var fetchTasks  = POL_USE_MOCK ? Promise.resolve(null)
    : authFetch('/api/wwp/tasks').then(function(r){ return r.json(); }).catch(function(){ return null; });
  var fetchInsp   = POL_USE_MOCK ? Promise.resolve(null)
    : authFetch('/api/vehiculos/inspecciones?fecha='+date).then(function(r){ return r.json(); }).catch(function(){ return null; });

  Promise.all([fetchBreaks, fetchTasks, fetchInsp]).then(function(results) {
    if (!POL_USE_MOCK) {
      var br=results[0], tk=results[1], ins=results[2];
      _polCtxData.breaks       = (br  && br.ok  && br.breaks)    ? br.breaks : [];
      _polCtxData.tasks        = (tk  && Array.isArray(tk))       ? tk        : [];
      _polCtxData.inspecciones = (ins && Array.isArray(ins))      ? ins       : [];
    } else {
      _polCtxData.mockEmps = _polMockLiveData();
    }
    impCompute(date);
  });
}

function impCompute(date) {
  var activePols = _polPolicies.filter((p) => { return p.activa; });
  var emps = _polGetEmployees();
  var tasks = _polCtxData.tasks || [];
  var today = new Date().toISOString().slice(0,10);

  var results = emps.map((emp) => {
    var polBreakdown = activePols.map((pol) => {
      var meta = POL_TYPE_META[pol.tipo] || { label:pol.tipo, icon:'clipboard-list' };
      var res  = _polEval(pol, emp);
      return { pol:pol, meta:meta, res:res };
    });
    var totalMin = polBreakdown.reduce(function(s,pb){ return s+(pb.res.minImpacto||0); }, 0);
    var nivel    = totalMin > 60 ? 'critico' : totalMin > 30 ? 'moderado' : totalMin > 0 ? 'leve' : 'ninguno';

    // Tareas asignadas a este empleado para la fecha
    var tareasHoy = POL_USE_MOCK
      ? _impMockTareas(emp.id, totalMin)
      : tasks.filter((t) => {
          var isAssigned = t.managerId === emp.id || (t.auxiliaryAssignees||[]).includes(emp.id);
          return isAssigned && (t.dueDate === date || ['in_progress','assigned'].includes(t.status));
        }).map((t) => {
          var riesgo = totalMin > 60 ? 'alto' : totalMin > 30 ? 'medio' : totalMin > 0 ? 'bajo' : 'ninguno';
          return { title:t.title, status:t.status, dueDate:t.dueDate, riesgo:riesgo };
        });

    return { emp:emp, polBreakdown:polBreakdown, totalMin:totalMin, nivel:nivel, tareasHoy:tareasHoy };
  });

  impRenderGrid(results);
}

function _impMockTareas(empId, totalMin) {
  var mockTasks = {
    m1:[ { title:'Despacho contenedor #4521', status:'in_progress', dueDate:new Date().toISOString().slice(0,10) } ],
    m2:[ { title:'Revisión inventario almacén B', status:'assigned', dueDate:new Date().toISOString().slice(0,10) },
         { title:'Reporte semanal de movimientos', status:'in_progress', dueDate:new Date(Date.now()+864e5).toISOString().slice(0,10) } ],
    m3:[ { title:'Carga camión #003', status:'in_progress', dueDate:new Date().toISOString().slice(0,10) } ],
    m4:[], m5:[ { title:'Ruta de entrega zona norte', status:'assigned', dueDate:new Date().toISOString().slice(0,10) } ],
    m6:[ { title:'Control de merma diaria', status:'in_progress', dueDate:new Date().toISOString().slice(0,10) } ],
  };
  return (mockTasks[empId] || []).map((t) => {
    var riesgo = totalMin > 60 ? 'alto' : totalMin > 30 ? 'medio' : totalMin > 0 ? 'bajo' : 'ninguno';
    return Object.assign({}, t, { riesgo:riesgo });
  });
}

function impRenderGrid(results) {
  var kNinguno=0, kLeve=0, kMod=0, kCrit=0;
  results.forEach((r) => {
    if(r.nivel==='ninguno') kNinguno++;
    else if(r.nivel==='leve') kLeve++;
    else if(r.nivel==='moderado') kMod++;
    else kCrit++;
  });
  var s=function(id,v){ var el=document.getElementById(id); if(el) el.textContent=v; };
  s('imp-k-ninguno',kNinguno); s('imp-k-leve',kLeve); s('imp-k-mod',kMod); s('imp-k-crit',kCrit);

  var riesgoMeta = {
    ninguno:{ label:'A tiempo', cls:'imp-riesgo-ok' },
    bajo:   { label:'Riesgo bajo', cls:'imp-riesgo-bajo' },
    medio:  { label:'Riesgo medio', cls:'imp-riesgo-medio' },
    alto:   { label:'Riesgo alto', cls:'imp-riesgo-alto' },
  };
  var nivelMeta = {
    ninguno:  { label:'Sin impacto',   cls:'imp-nivel-ninguno' },
    leve:     { label:'Leve',          cls:'imp-nivel-leve' },
    moderado: { label:'Moderado',      cls:'imp-nivel-moderado' },
    critico:  { label:'Crítico',       cls:'imp-nivel-critico' },
  };

  var cards = results.map((r) => {
    var nm = nivelMeta[r.nivel] || nivelMeta.ninguno;
    var bkd = r.polBreakdown.map((pb) => {
      var min = pb.res.minImpacto || 0;
      var cls = min > 0 ? 'rojo' : (pb.res.status==='complied' ? 'verde' : 'gris');
      return '<div class="imp-breakdown-row">'
        + '<span class="imp-breakdown-pol">'+_polIcon(pb.meta.icon)+escH(pb.pol.nombre)+'</span>'
        + '<span class="imp-breakdown-min '+cls+'">'+(min>0?'-'+min+' min':pb.res.status==='complied'?'✓ OK':'—')+'</span>'
        + '</div>';
    }).join('');
    var tareasHtml = '';
    if (r.tareasHoy.length) {
      tareasHtml = '<div class="imp-tareas-hdr">Tareas del día</div>'
        + r.tareasHoy.map((t) => {
            var rm = riesgoMeta[t.riesgo] || riesgoMeta.ninguno;
            return '<div class="imp-tarea-row">'
              + '<span class="imp-tarea-title" title="'+escH(t.title)+'">'+escH(t.title)+'</span>'
              + '<span class="imp-riesgo-badge '+rm.cls+'">'+rm.label+'</span>'
              + '</div>';
          }).join('');
    }
    var totalColor = r.totalMin > 0 ? 'rojo' : '';
    return '<div class="imp-emp-card'+(r.nivel!=='ninguno'?' nivel-'+r.nivel:'')+'">'
      + '<div class="imp-emp-hdr">'
      + '<div>'
      + '<div class="imp-emp-name">'+escH(r.emp.name||r.emp.id)+'</div>'
      + (r.emp.role ? '<div class="imp-emp-sub">'+escH(r.emp.role)+'</div>' : '')
      + '</div>'
      + '<span class="imp-nivel-badge '+nm.cls+'">'+nm.label+'</span>'
      + '</div>'
      + (bkd ? '<div class="imp-breakdown">'+bkd+'</div>' : '')
      + '<div class="imp-total-row"><span>Total minutos perdidos</span><span class="imp-total-val '+totalColor+'">'+r.totalMin+' min</span></div>'
      + tareasHtml
      + '</div>';
  }).join('');

  var grid = document.getElementById('imp-emp-grid');
  if (grid) { grid.innerHTML = cards || '<div class="imp-empty">Sin empleados activos</div>'; if(window.lucide) lucide.createIcons(); }
}

var _eqpSemFilter = null;      // filtro de semáforo activo (clic en KPI)
var _eqpLineSel = null;        // set de ids visibles en el gráfico de líneas (null = top por IT)

var EQP_SEM_META = {

// Colores de línea por trayectoria (tokens; sin hex). Resuelve a su valor en runtime.
function eqpTrayColor(tray) {

    ascenso:'--green-dot', sostenido_alto:'--blue-dot', descenso:'--red-dot',

function eqpLocLabel(loc) {
  if (loc === 'SIN_LOCALIDAD') return 'Sin localidad';
  if (loc === 'todas' || !loc) return 'Todas';
  return loc;
}

// ── Carga ───────────────────────────────────────────────────────────────────
function eqpRefresh() {
  var body = document.getElementById('eqp-body');
  var loc = (document.getElementById('eqp-loc') || {}).value || 'todas';
  if (body) body.innerHTML = '<div class="eqp-empty"><div class="spinner" style="width:22px;height:22px;margin:0 auto 10px"></div>Cargando equipo…</div>';
  var url = '/api/wwp/metrics/equipo' + (loc && loc !== 'todas' ? '?localidad=' + encodeURIComponent(loc) : '');
  authGetJson(url, 15000).then(function(data) {
    _eqpLoaded = true;
    // authGetJson ya devuelve el JSON desempaquetado (igual que loadTasks), no un wrapper {status,ok,data}.
    if (!data || !data.ok) throw new Error((data && data.error) || 'Respuesta inválida del servidor');
    _eqpData = data;
    eqpPopulateLocs(_eqpData.localidades, loc);
    _eqpLineSel = null;  // reset selección de líneas al recargar
    eqpRenderAll();
  }).catch(function(e) {
    _eqpLoaded = true;
    var msg = (e && e.message) ? e.message : 'error';
    if (/403|permiso|denegad/i.test(msg)) { eqpRenderDenied(); return; }
    if (body) body.innerHTML = '<div class="eqp-empty"><i data-lucide="alert-triangle"></i>No se pudo cargar el equipo: ' + esc(msg) + '</div>';
    if (window.lucide) lucide.createIcons();
  });
}

function eqpRenderDenied() {
  var body = document.getElementById('eqp-body');
  if (body) body.innerHTML = '<div class="eqp-403"><i data-lucide="lock"></i>Este panel es solo para encargados y gerencia. No tienes permiso para ver las métricas del equipo.</div>';
  ['eqp-k-activo','eqp-k-tibio','eqp-k-inactivo','eqp-k-nunca'].forEach(function(id){ var el=document.getElementById(id); if(el) el.textContent='—'; });
  if (window.lucide) lucide.createIcons();
}

function eqpPopulateLocs(locs, current) {
  var sel = document.getElementById('eqp-loc');
  if (!sel || !Array.isArray(locs)) return;
  // Reconstruir solo si cambió el conjunto (evita perder la selección al refrescar)
  var want = 'todas|' + locs.join('|');
  if (sel.getAttribute('data-locs') === want) { sel.value = current; return; }
  sel.setAttribute('data-locs', want);
  var html = '<option value="todas">Todas</option>';
  locs.forEach(function(l){ html += '<option value="' + esc(l) + '">' + esc(eqpLocLabel(l)) + '</option>'; });
  sel.innerHTML = html;
  sel.value = current || 'todas';
}

// ── Render maestro ────────────────────────────────────────────────────────────
function eqpRenderAll() {
  var d = _eqpData; if (!d) return;
  var users = d.usuarios || [];
  // Nota de ventana + KPIs de semáforo
  var note = document.getElementById('eqp-window-note');
  if (note) note.textContent = 'Ventana ' + (d.windowDays || 14) + ' días · ' + users.length + ' usuario' + (users.length===1?'':'s') + ' · ' + eqpLocLabel(d.localidadFiltro);
  var counts = { activo:0, tibio:0, inactivo:0, nunca:0 };
  users.forEach(function(u){ if (counts[u.semaforo] != null) counts[u.semaforo]++; });
  var setK = function(id,v){ var el=document.getElementById(id); if(el) el.textContent=v; };
  setK('eqp-k-activo', counts.activo); setK('eqp-k-tibio', counts.tibio);
  setK('eqp-k-inactivo', counts.inactivo); setK('eqp-k-nunca', counts.nunca);
  // Marcar KPI seleccionado (filtro)
  [['eqp-k-activo','activo','s-activo'],['eqp-k-tibio','tibio','s-tibio'],['eqp-k-inactivo','inactivo','s-inactivo'],['eqp-k-nunca','nunca','s-nunca']].forEach(function(x){
    var card = document.getElementById(x[0]); card = card ? card.closest('.eqp-kpi') : null;
    if (card) card.classList.toggle('sel', _eqpSemFilter === x[1]);
  });

  var body = document.getElementById('eqp-body');
  if (!body) return;
  if (!users.length) {
    body.innerHTML = '<div class="eqp-empty"><i data-lucide="users"></i>No hay usuarios para esta localidad.</div>';
    if (window.lucide) lucide.createIcons();
    return;
  }
  body.innerHTML =
    eqpTermometroHtml(users) +
    eqpSemaforoHtml(users) +
    eqpLinesHtml(users) +
    eqpBarsHtml(users) +
    eqpRankingHtml(users) +
    eqpManagersHtml(users);
  if (window.lucide) lucide.createIcons();
  hydrateOdooAvatars(body);   // fotos de Odoo en semáforo + encargados del dashboard de Equipo
  eqpDrawLines();  // dibuja el SVG tras montar el DOM
}

// ── Panel 1: Semáforo de adopción (tarjetas por usuario, agrupadas por rol) ──
function eqpSemaforoHtml(users) {
  var pool = _eqpSemFilter ? users.filter(function(u){ return u.semaforo === _eqpSemFilter; }) : users;
  var fm = _eqpSemFilter ? (EQP_SEM_META[_eqpSemFilter] || EQP_SEM_META.nunca) : null;
  var filterChip = fm
    ? '<button class="eqp-legend-chip" onclick="eqpClearSemFilter()"><span class="eqp-legend-swatch" style="border-radius:50%;background:' + fm.color + '"></span>Filtro: ' + fm.label + ' ✕</button>'
    : '';
  var groups = EQP_ROLE_GROUPS.map(function(g) {
    var list = pool.filter(function(u){ return g.keys.indexOf(u.role) !== -1; });
    if (!list.length) return '';
    var cards = list.map(function(u) {
      var sm = EQP_SEM_META[u.semaforo] || EQP_SEM_META.nunca;
      var tm = EQP_TRAY_META[u.trayectoria] || EQP_TRAY_META.sin_historia;
      return '<div class="eqp-card ' + sm.cls + '">' +
        avatarHtml(u, 34) +
        '<div class="eqp-card-body">' +
          '<div class="eqp-card-name" title="' + esc(u.name) + '">' + esc(u.name) + '</div>' +
          '<div class="eqp-card-meta">' + eqpLastActivityLabel(u) + '</div>' +
        '</div>' +
        '<span class="eqp-tag ' + tm.cls + '"><i data-lucide="' + tm.icon + '"></i>' + tm.label + '</span>' +
      '</div>';
    }).join('');
    return '<div class="eqp-role-group"><div class="eqp-role-group-hdr">' + esc(g.label) + ' · ' + list.length + '</div><div class="eqp-card-grid">' + cards + '</div></div>';
  }).join('');
  if (!groups) groups = '<div class="eqp-empty">Ningún usuario con este estado.</div>';
  return '<div class="eqp-panel">' +
    '<div class="eqp-panel-hdr"><h3 class="eqp-panel-title"><i data-lucide="gauge"></i>Semáforo de adopción</h3>' + filterChip + '</div>' +
    '<p class="eqp-panel-sub">Quién está usando la plataforma. Verde = activo · ámbar = tibio · rojo = inactivo · gris = nunca entró.</p>' +
    groups + '</div>';
}
function eqpLastActivityLabel(u) {
  var sm = (EQP_SEM_META[u.semaforo] || EQP_SEM_META.nunca).label;
  if (u.semaforo === 'nunca' || !u.lastActivity) return sm + ' · sin actividad registrada';
  var h = (Date.now() - new Date(u.lastActivity).getTime()) / 36e5;
  var rel;
  if (h < 1) rel = 'hace minutos';
  else if (h < 24) rel = 'hace ' + Math.round(h) + ' h';
  else rel = 'hace ' + Math.round(h/24) + ' día' + (Math.round(h/24)===1?'':'s');
  return sm + ' · últ. actividad ' + rel;
}
function eqpClearSemFilter() { _eqpSemFilter = null; eqpRenderAll(); }
function eqpToggleSemFilter(s) { _eqpSemFilter = (_eqpSemFilter === s) ? null : s; eqpRenderAll(); }

// ── Panel 2: Nivel de uso en el tiempo (SVG, media móvil 7d) ─────────────────
function eqpMovAvg(serie, win) {
  win = win || 7;
  var ns = serie.map(function(p){ return p.n || 0; });
  return ns.map(function(_, i){
    var s = 0, c = 0;
    for (var j = Math.max(0, i - win + 1); j <= i; j++) { s += ns[j]; c++; }
    return c ? s / c : 0;
  });
}
function eqpLineUsers(users) {
  // Por defecto: top 6 por IT con algo de actividad; si el usuario seleccionó, respeta su set.
  if (_eqpLineSel) return users.filter(function(u){ return _eqpLineSel.indexOf(u.id) !== -1; });
  var withAct = users.filter(function(u){ return (u.serie||[]).some(function(p){ return p.n>0; }); });
  return withAct.slice(0, 6);
}
function eqpLinesHtml(users) {
  var active = users.filter(function(u){ return (u.serie||[]).some(function(p){ return p.n>0; }); });
  if (!active.length) {
    return '<div class="eqp-panel"><div class="eqp-panel-hdr"><h3 class="eqp-panel-title"><i data-lucide="line-chart"></i>Nivel de uso en el tiempo</h3></div>' +
      '<p class="eqp-panel-sub">Acciones por día (media móvil de 7 días).</p>' +
      '<div class="eqp-lines-wrap"><div class="eqp-lines-empty">Aún no hay actividad registrada en esta ventana para graficar.</div></div></div>';
  }
  // Leyenda: todos los que tienen actividad (clicables para mostrar/ocultar)
  var shown = eqpLineUsers(users).map(function(u){ return u.id; });
  var legend = active.map(function(u){
    var off = shown.indexOf(u.id) === -1 ? ' off' : '';
    return '<button class="eqp-legend-chip' + off + '" onclick="eqpToggleLine(\'' + u.id + '\')">' +
      '<span class="eqp-legend-swatch" style="background:' + eqpTrayColor(u.trayectoria) + '"></span>' + esc((u.name||'').split(' ')[0]) + '</button>';
  }).join('');
  return '<div class="eqp-panel">' +
    '<div class="eqp-panel-hdr"><h3 class="eqp-panel-title"><i data-lucide="line-chart"></i>Nivel de uso en el tiempo</h3></div>' +
    '<p class="eqp-panel-sub">Acciones por día (media móvil de 7 días). Contrasta quién sube vs. quién se quedó. Clic en un nombre para mostrar u ocultar su línea.</p>' +
    '<div class="eqp-lines-wrap"><svg class="eqp-lines-svg" id="eqp-lines-svg" preserveAspectRatio="none"></svg>' +
    '<div class="eqp-lines-legend">' + legend + '</div></div></div>';
}
function eqpToggleLine(id) {
  if (!_eqpData) return;
  var active = (_eqpData.usuarios||[]).filter(function(u){ return (u.serie||[]).some(function(p){ return p.n>0; }); });
  if (!_eqpLineSel) _eqpLineSel = eqpLineUsers(_eqpData.usuarios).map(function(u){ return u.id; });
  var i = _eqpLineSel.indexOf(id);
  if (i === -1) _eqpLineSel.push(id); else _eqpLineSel.splice(i, 1);
  eqpRenderAll();
}
function eqpDrawLines() {
  var svg = document.getElementById('eqp-lines-svg');
  if (!svg || !_eqpData) return;
  var list = eqpLineUsers(_eqpData.usuarios);
  var W = 720, H = 200, padL = 30, padR = 8, padT = 10, padB = 22;
  svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
  var serieLen = 0;
  (_eqpData.usuarios||[]).forEach(function(u){ if ((u.serie||[]).length > serieLen) serieLen = u.serie.length; });
  if (!serieLen) { svg.innerHTML = ''; return; }
  // Escala Y: máximo de la media móvil entre los usuarios mostrados (mínimo 1)
  var maxY = 1;
  var smoothed = list.map(function(u){
    var sm = eqpMovAvg(u.serie || [], 7);
    sm.forEach(function(v){ if (v > maxY) maxY = v; });
    return { u:u, sm:sm };
  });
  var plotW = W - padL - padR, plotH = H - padT - padB;
  var xAt = function(i){ return padL + (serieLen <= 1 ? 0 : (i/(serieLen-1)) * plotW); };
  var yAt = function(v){ return padT + plotH - (v/maxY) * plotH; };
  var parts = [];
  // Nota: usamos style="stroke:var()/fill:var()" en vez de atributos stroke=/fill= porque
  // var() en atributos SVG no resuelve de forma fiable en Safari/iOS; en style sí.
  // Grid horizontal (3 líneas) + ejes
  for (var g = 0; g <= 2; g++) {
    var gy = padT + (g/2) * plotH;
    parts.push('<line x1="' + padL + '" y1="' + gy.toFixed(1) + '" x2="' + (W-padR) + '" y2="' + gy.toFixed(1) + '" style="stroke:var(--border-light)" stroke-width="1"/>');
  }
  var maxLbl = Math.round(maxY*10)/10;
  parts.push('<text x="' + (padL-5) + '" y="' + (padT+4) + '" text-anchor="end" font-size="9" style="fill:var(--text-muted)">' + maxLbl + '</text>');
  parts.push('<text x="' + (padL-5) + '" y="' + (padT+plotH) + '" text-anchor="end" font-size="9" style="fill:var(--text-muted)">0</text>');
  // Etiquetas X (primer y último día)
  var s0 = (list[0] && list[0].serie) ? list[0].serie : ((_eqpData.usuarios[0]||{}).serie || []);
  if (s0.length) {
    parts.push('<text x="' + padL + '" y="' + (H-6) + '" text-anchor="start" font-size="9" style="fill:var(--text-muted)">' + (s0[0].d||'').slice(5) + '</text>');
    parts.push('<text x="' + (W-padR) + '" y="' + (H-6) + '" text-anchor="end" font-size="9" style="fill:var(--text-muted)">' + (s0[s0.length-1].d||'').slice(5) + '</text>');
  }
  // Líneas (polyline por usuario)
  smoothed.forEach(function(o){
    var pts = o.sm.map(function(v,i){ return xAt(i).toFixed(1) + ',' + yAt(v).toFixed(1); }).join(' ');
    parts.push('<polyline points="' + pts + '" style="fill:none;stroke:' + eqpTrayColor(o.u.trayectoria) + '" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>');
  });
  svg.innerHTML = parts.join('');
}

// ── Panel 3: Tareas por usuario (barras apiladas por estado) ─────────────────
function eqpBarsHtml(users) {
  var withTasks = users.filter(function(u){ return (u.tareasTotal||0) > 0; })
    .sort(function(a,b){ return (b.tareasTotal||0) - (a.tareasTotal||0); });
  if (!withTasks.length) {
    return '<div class="eqp-panel"><div class="eqp-panel-hdr"><h3 class="eqp-panel-title"><i data-lucide="bar-chart-3"></i>Tareas por usuario</h3></div>' +
      '<p class="eqp-panel-sub">Carga de tareas por estado.</p>' +
      '<div class="eqp-empty"><i data-lucide="inbox"></i>Ningún usuario tiene tareas en esta localidad.</div></div>';
  }
  var maxT = Math.max.apply(null, withTasks.map(function(u){ return u.tareasTotal||0; }));
  var rows = withTasks.map(function(u) {
    var act = u.activas||0, comp = (u.completadas||0) - (u.validadas||0), val = u.validadas||0;
    if (comp < 0) comp = 0;  // completadas incluye validadas en el backend; mostramos completadas-no-validadas aparte
    var scale = function(n){ return maxT > 0 ? (n/maxT*100) : 0; };
    var seg = function(n,cls,title){ return n>0 ? '<div class="eqp-bar-seg ' + cls + '" style="width:' + scale(n).toFixed(1) + '%" title="' + title + ': ' + n + '"></div>' : ''; };
    return '<div class="eqp-bar-row">' +
      '<span class="eqp-bar-name" title="' + esc(u.name) + '">' + esc(u.name) + '</span>' +
      '<div class="eqp-bar-track">' + seg(act,'b-activas','Activas') + seg(comp,'b-completadas','Completadas') + seg(val,'b-validadas','Validadas') + '</div>' +
      '<span class="eqp-bar-total">' + (u.tareasTotal||0) + '</span>' +
    '</div>';
  }).join('');
  return '<div class="eqp-panel">' +
    '<div class="eqp-panel-hdr"><h3 class="eqp-panel-title"><i data-lucide="bar-chart-3"></i>Tareas por usuario</h3></div>' +
    '<p class="eqp-panel-sub">Carga total y su composición por estado.</p>' +
    '<div class="eqp-bars">' + rows + '</div>' +
    '<div class="eqp-bars-legend">' +
      '<span><span class="eqp-sw" style="background:var(--blue-dot)"></span>Activas</span>' +
      '<span><span class="eqp-sw" style="background:var(--amber-dot)"></span>Completadas</span>' +
      '<span><span class="eqp-sw" style="background:var(--green-dot)"></span>Validadas</span>' +
    '</div></div>';
}

// ── Panel 4: Ranking por trayectoria (tabla ordenable) ───────────────────────
function eqpRankingHtml(users) {
  var cols = [
    { key:'name',              label:'Usuario',     num:false },
    { key:'indiceTrayectoria', label:'Índice',      num:true },
    { key:'nivel',             label:'Nivel',       num:true },
    { key:'delta',             label:'Δ vs. previo',num:true },
    { key:'trayectoria',       label:'Trayectoria', num:false }
  ];
  var rows = users.slice().sort(eqpRankCmp);
  var ths = cols.map(function(c){
    var sorted = _eqpSort.key === c.key ? ' sorted' : '';
    var ind = _eqpSort.key === c.key ? (_eqpSort.dir==='desc' ? ' ▼' : ' ▲') : ' ⇅';
    return '<th class="' + (c.num?'num':'') + sorted + '" onclick="eqpSortBy(\'' + c.key + '\')">' + esc(c.label) + '<span class="eqp-sort-ind">' + ind + '</span></th>';
  }).join('');
  var trs = rows.map(function(u) {
    var tm = EQP_TRAY_META[u.trayectoria] || EQP_TRAY_META.sin_historia;
    var dCls = u.delta>0 ? 'eqp-delta-up' : (u.delta<0 ? 'eqp-delta-down' : 'eqp-delta-flat');
    var dTxt = (u.delta>0?'+':'') + (u.delta||0);
    return '<tr>' +
      '<td>' + esc(u.name) + '</td>' +
      '<td class="num"><span class="eqp-it-bar"><span style="width:' + Math.max(0,Math.min(100,u.indiceTrayectoria||0)) + '%"></span></span>' + (u.indiceTrayectoria||0) + '</td>' +
      '<td class="num">' + (u.nivel||0) + '</td>' +
      '<td class="num ' + dCls + '">' + dTxt + '</td>' +
      '<td><span class="eqp-tag ' + tm.cls + '"><i data-lucide="' + tm.icon + '"></i>' + tm.label + '</span></td>' +
    '</tr>';
  }).join('');
  return '<div class="eqp-panel">' +
    '<div class="eqp-panel-hdr"><h3 class="eqp-panel-title"><i data-lucide="list-ordered"></i>Ranking por trayectoria</h3></div>' +
    '<p class="eqp-panel-sub">El que mejoró no es el mismo que se quedó. Ordena por cualquier columna.</p>' +
    '<div class="eqp-table-wrap"><table class="eqp-table"><thead><tr>' + ths + '</tr></thead><tbody>' + trs + '</tbody></table></div></div>';
}
function eqpRankCmp(a, b) {
  var k = _eqpSort.key, dir = _eqpSort.dir === 'desc' ? -1 : 1;
  var va = a[k], vb = b[k];
  if (typeof va === 'string' || typeof vb === 'string') {
    return String(va||'').localeCompare(String(vb||'')) * dir;
  }
  return ((va||0) - (vb||0)) * dir;
}
function eqpSortBy(key) {
  if (_eqpSort.key === key) { _eqpSort.dir = (_eqpSort.dir === 'desc') ? 'asc' : 'desc'; }
  else { _eqpSort.key = key; _eqpSort.dir = (key === 'name' || key === 'trayectoria') ? 'asc' : 'desc'; }
  eqpRenderAll();
}

// ── Panel 5: Encargados (validaciones + cierres) ─────────────────────────────
function eqpTermometroHtml(users) {
  var mgrs = users.filter(function(u){ return u.role === 'manager' && u.termometro !== null && u.termometro !== undefined; });
  if (!mgrs.length) return '';
  var cards = mgrs.map(function(u) {
    var detalle = u.termometroDetalle || [];
    var pct = u.termometro;
    var termoContent = '';
    var cDet = u.cierreDetalle || [];
    var cPct = u.tasaCierre;
    if (detalle.length > 1) {
      // Adopción por equipo
      var bars = detalle.map(function(d) {
        var pctCls = d.pct >= 70 ? 'color:var(--green-text)' : d.pct >= 40 ? 'color:var(--amber-text)' : 'color:var(--red-text)';
        return '<div class="eqp-termo-row">' +
          '<div class="eqp-termo-lbl"><span>' + esc(d.categoria) + '</span><span class="eqp-termo-pct" style="' + pctCls + '">' + d.pct + '%</span></div>' +
          eqpTermoBar(d.pct) +
        '</div>';
      }).join('');
      var consPctCls = pct >= 70 ? 'color:var(--green-text)' : pct >= 40 ? 'color:var(--amber-text)' : 'color:var(--red-text)';
      termoContent = bars + '<div class="eqp-termo-consolidado">Adopción consolidada: <b style="' + consPctCls + '">' + pct + '%</b></div>';
      // Cierre por equipo
      if (cDet.length > 0 && cPct !== null) {
        var cBars = cDet.map(function(cd) {
          var cPctCls = cd.pct >= 70 ? 'color:var(--green-text)' : cd.pct >= 40 ? 'color:var(--amber-text)' : 'color:var(--red-text)';
          return '<div class="eqp-termo-row">' +
            '<div class="eqp-termo-lbl"><span>' + esc(cd.categoria) + '</span><span class="eqp-termo-pct" style="' + cPctCls + '">' + cd.pct + '%</span></div>' +
            eqpTermoBar(cd.pct) +
            '<div style="font-size:10px;color:var(--text-muted);margin-top:3px">' + cd.cerradas + ' de ' + cd.total + ' cerradas</div>' +
          '</div>';
        }).join('');
        var ccPctCls = cPct >= 70 ? 'color:var(--green-text)' : cPct >= 40 ? 'color:var(--amber-text)' : 'color:var(--red-text)';
        termoContent += '<div class="eqp-termo-seccion-lbl">Cierre de tareas</div>' + cBars +
          '<div class="eqp-termo-consolidado">Cierre consolidado: <b style="' + ccPctCls + '">' + cPct + '%</b></div>';
      }
    } else if (detalle.length === 1) {
      var d = detalle[0];
      var pctCls = pct >= 70 ? 'color:var(--green-text)' : pct >= 40 ? 'color:var(--amber-text)' : 'color:var(--red-text)';
      termoContent = '<div class="eqp-termo-row">' +
        '<div class="eqp-termo-lbl"><span>' + esc(d.categoria) + '</span><span class="eqp-termo-pct" style="' + pctCls + '">' + pct + '%</span></div>' +
        eqpTermoBar(pct) +
        '<div style="font-size:10px;color:var(--text-muted);margin-top:3px">' + d.activos + ' de ' + d.total + ' conectados</div>' +
      '</div>';
      // Cierre de tareas
      if (cDet.length === 1 && cPct !== null) {
        var cd = cDet[0];
        var cPctCls = cPct >= 70 ? 'color:var(--green-text)' : cPct >= 40 ? 'color:var(--amber-text)' : 'color:var(--red-text)';
        termoContent += '<div class="eqp-termo-row" style="margin-top:8px">' +
          '<div class="eqp-termo-lbl"><span>Cierre de tareas</span><span class="eqp-termo-pct" style="' + cPctCls + '">' + cPct + '%</span></div>' +
          eqpTermoBar(cPct) +
          '<div style="font-size:10px;color:var(--text-muted);margin-top:3px">' + cd.cerradas + ' de ' + cd.total + ' cerradas</div>' +
        '</div>';
      }
    }
    return '<div class="eqp-mgr-card">' +
      '<div class="eqp-mgr-name">' + avatarHtml(u, 28) + '<span title="' + esc(u.name) + '" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(u.name) + '</span></div>' +
      '<div class="eqp-termo-wrap">' + termoContent + '</div>' +
    '</div>';
  }).join('');
  return '<div class="eqp-panel">' +
    '<div class="eqp-panel-hdr"><h3 class="eqp-panel-title"><i data-lucide="thermometer"></i>Termómetro de Adopción</h3></div>' +
    '<p class="eqp-panel-sub">Qué porcentaje del equipo directo de cada encargado está usando la plataforma activamente. Verde ≥70% · Ámbar 40–69% · Rojo &lt;40%.</p>' +
    '<div class="eqp-mgr-grid">' + cards + '</div></div>';
}

function eqpTermoBar(pct) {
  if (pct === null || pct === undefined) return '';
  var fillCls = pct >= 70 ? 'eqp-termo-fill-green' : pct >= 40 ? 'eqp-termo-fill-amber' : 'eqp-termo-fill-red';
  var pctCls  = pct >= 70 ? 'color:var(--green-text)' : pct >= 40 ? 'color:var(--amber-text)' : 'color:var(--red-text)';
  return '<div class="eqp-termo-bar-bg"><div class="eqp-termo-bar-fill ' + fillCls + '" style="width:' + pct + '%"></div></div>';
}

function eqpManagersHtml(users) {
  var mgrs = users.filter(function(u){ return u.role === 'admin' || u.role === 'manager'; });
  if (!mgrs.length) return '';
  var cards = mgrs.map(function(u) {
    return '<div class="eqp-mgr-card">' +
      '<div class="eqp-mgr-name">' + avatarHtml(u, 28) + '<span title="' + esc(u.name) + '" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(u.name) + '</span></div>' +
      '<div class="eqp-mgr-stats">' +
        '<div class="eqp-mgr-stat"><div class="eqp-mgr-stat-val">' + (u.validacionesHechas||0) + '</div><div class="eqp-mgr-stat-lbl">Validaciones</div></div>' +
        '<div class="eqp-mgr-stat"><div class="eqp-mgr-stat-val">' + (u.cierresGestionados||0) + '</div><div class="eqp-mgr-stat-lbl">Cierres gestionados</div></div>' +
      '</div></div>';
  }).join('');
  return '<div class="eqp-panel">' +
    '<div class="eqp-panel-hdr"><h3 class="eqp-panel-title"><i data-lucide="shield-check"></i>Encargados: supervisión del trabajo</h3></div>' +
    '<p class="eqp-panel-sub">Cuánto están validando y cerrando el trabajo de los auxiliares (ventana de ' + ((_eqpData&&_eqpData.windowDays)||14) + ' días).</p>' +
    '<div class="eqp-mgr-grid">' + cards + '</div></div>';
}

window.addEventListener('DOMContentLoaded', function(){
  var raiz = document.getElementById('tab-impacto');
  if (raiz) raiz.style.display = 'block';   // en la isla, el bloque ES la página
  if (window.lucide) lucide.createIcons();
  impInit();
  islaAnunciarReady('impacto');
});
</script>
</body>
</html>
